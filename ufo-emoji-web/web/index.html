<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>UFO Emoji · SuperBox64 SpriteKit Swift on WASM</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; touch-action: none; }
    /* Mode 2 (iPhone): the game renders at 626x352; CSS letterboxes to fit. */
    #game { width: min(100vw, calc(100vh * 626 / 352)); aspect-ratio: 626 / 352;
      background: #000; object-fit: contain; outline: none; touch-action: none; }
    #game:fullscreen, #game:-webkit-full-screen { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <canvas id="game" width="626" height="352" tabindex="0"></canvas>
  <script>
    window.WASMWEB = {
      logicalWidth: 626,
      logicalHeight: 352,
      wasmUrl: 'ufoemoji.wasm',
      cacheBust: '20260614181611',
      assetRoot: 'assets',
      title: 'UFO EMOJI'
    };
  </script>
  <script src="runtime.js?v=20260614181611"></script>
</body>
</html>
